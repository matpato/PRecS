<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drug Recommender</title>
    <link rel="stylesheet" href="webpage/style.css">
</head>
<body>
    <main class="container">
        <header>
            <h1>Drug Recommender</h1>
        </header>

        <div class="card search-panel">
            
            <div class="input-group">
                <label>Describe the symptoms</label>
                <textarea id="symptomInput" placeholder="E.g., severe headache and nausea..." oninput="getConditions()"></textarea>
            </div>

            <div class="grid-2">
                <div class="input-group">
                    <label>Select a type of disease (Manual)</label>
                    <select id="diseaseInput" onchange="updateSliders(this.value)">
                        <option value="">-- Select Manually --</option>
                        <option value="diabetes-t2">Diabetes-T2 (5A10)</option>
                        <option value="Depression">Depression</option>
                        <option value="Anxiety">Anxiety</option>
                        <option value="Pain">Pain</option>
                        <option value="Acne">Acne</option>
                        <option value="High Blood Pressure">High Blood Pressure</option>
                        <option value="Insomnia">Insomnia</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Select expected condition</label>
                    <select id="conditionInput" onchange="updateSliders(this.value)">
                        <option value="">Waiting for symptoms...</option>
                    </select>
                </div>
            </div>

            <div class="grid-2">
                <div class="input-group">
                    <label>Recommendation Model</label>
                    <select id="modelInput">
                        <option value="all-models">All Models</option>
                        <option value="collaborative">Collaborative Filtering</option>
                        <option value="content-based">Content Based</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label>Number of Recommendations</label>
                    <input type="number" id="recommendationsInput" min="1" max="10" value="5">
                </div>
            </div>

            <div class="input-group">
                <label>Confidence Score Strategy:</label>
                <div style="border: 2px solid hsl(205, 14%, 68%);; border-radius: 0.5rem; padding: 20px; margin-bottom: 1rem;">
                    <label>Maximum Reviews (Dataset Max):</label>
                    <div style="display: flex; align-items: center; gap: 20px;">
                        <input type="range" id="maxInput" value="1" min="1" max="5000" step="1" oninput="this.nextElementSibling.value = this.value">
                        <output>1</output>
                    </div>
                    
                    <label>Confidence (Score of Top Result):</label>
                    <div style="display: flex; align-items: center; gap: 20px;">
                        <input type="range" id="confidenceInput" value="0" min="0" max="100" step="1" oninput="this.nextElementSibling.value = this.value">
                        <output>0%</output>
                    </div>
                </div>     
    
                <label>Recency Strategy:</label>
                <div style="border: 2px solid hsl(205, 14%, 68%); border-radius: 0.5rem; padding: 20px; margin-bottom: 1rem;">
                    <label>Minimum Reviews:</label>
                    <div style="display: flex; align-items: center; gap: 20px;">
                        <input type="range" id="minReviewsInput" value="1" min="1" max="50" step="1" oninput="this.nextElementSibling.value = this.value">
                        <output>1</output>
                    </div>
                    <label>Reviews Recency:</label>
                    <select id="recencyPeriodInput">
                        <option value="all">All time (Default)</option>
                        <option value="1-month">From the last month</option>
                        <option value="6-months">From the last 6 months</option>
                        <option value="12-months">From the last 12 months</option>
                        <option value="2-years">From the last 2 years</option>
                        <option value="5-years">From the last 5 years</option>
                        <option value="10-years">From the last 10 years</option>
                    </select>
                </div>     
            </div>

            <div class="input-group" style="margin-top: 20px;">
                <button id="searchBtn" onclick="getRecommendations()">🔍 Search Drugs</button>
            </div>
        </div>

        <div class="card results-panel">
            <h2 style="text-align: center; color: #2563eb; margin-bottom: 20px;">RECOMMENDATIONS</h2>
            <div class="table-wrapper">
                <table id="resultsArea">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Drug</th>
                            <th>Condition</th>
                            <th>Raw Score</th>
                            <th>Weighted Rating</th>
                            <th>Confidence</th>
                            <th>Sample Size</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="7" style="text-align:center; padding: 2rem; color: #666;">
                                Please describe symptoms or select a condition to see results.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <footer>
            &copy; Copyright 2026 <b>Cesare Gasparini</b>, <b>Hejzell Isufi</b> & <b>Bahae Taifi</b>
        </footer>
    </main>

    <script src="webpage/script.js"></script>
</body>
</html>
